; PlatformIO Project Configuration
; ESP32 DevKit V1 - Propeller Test Stand
;
; Toggle ESC protocol at compile time:
;   * Default build (below) uses standard 50 Hz servo PWM.
;   * To build for DShot600, uncomment the USE_DSHOT build flag in
;     [env:esp32dev] and make sure the DShotRMT library is installed.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3
;   -DUSE_DSHOT                 ; <-- uncomment to build the DShot600 variant

lib_deps =
    bogde/HX711 @ ^0.7.5
    ; DShotRMT is always pulled in so both builds compile out-of-the-box.
    ; Source: https://github.com/derdoktor667/DShotRMT
    https://github.com/derdoktor667/DShotRMT.git
