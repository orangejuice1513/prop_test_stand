; PlatformIO Project Configuration
; ESP32 DevKit V1 - Propeller Test Stand
;
; Environments:
;   esp32dev           - full build of main.cpp + all modules (production)
;   test_esc           - standalone PWM ESC bring-up (src/test_esc.cpp)
;   test_esc_dshot     - standalone DShot600 ESC bring-up (src/test_esc_dshot.cpp)
;   test_loadcell      - HX711 bring-up over USB serial (src/test_loadcell.cpp)
;   test_loadcell_wifi - HX711 bring-up over WiFi UDP (src/test_loadcell_wifi.cpp)
;
; CLI:
;   pio run -e test_loadcell   -t upload
;   pio run -e test_esc        -t upload       # PWM motor bring-up
;   pio run -e test_esc_dshot  -t upload       # DShot motor bring-up
;   pio run -e esp32dev        -t upload       # full integrated firmware

[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3

; -- Production build: main.cpp + modules, excludes the bring-up sketches ----
[env:esp32dev]
build_src_filter =
    +<*>
    -<test_esc.cpp>
    -<test_esc_dshot.cpp>
    -<test_loadcell.cpp>
    -<test_loadcell_wifi.cpp>
build_flags =
    ${env.build_flags}
    -DUSE_DSHOT                 ; DShot600 on the ESC signal line
lib_deps =
    bogde/HX711 @ ^0.7.5

; -- PWM ESC bring-up: test_esc.cpp + aux UART telemetry --------------------
[env:test_esc]
build_src_filter =
    -<*>
    +<test_esc.cpp>
    +<esc_telem.cpp>

; -- DShot ESC bring-up: test_esc_dshot.cpp + dshot600_rmt.cpp + telem ------
[env:test_esc_dshot]
build_src_filter =
    -<*>
    +<test_esc_dshot.cpp>
    +<dshot600_rmt.cpp>
    +<esc_telem.cpp>

; -- Load-cell bring-up over USB serial --------------------------------------
[env:test_loadcell]
build_src_filter =
    -<*>
    +<test_loadcell.cpp>
lib_deps =
    bogde/HX711 @ ^0.7.5

; -- Load-cell bring-up over WiFi UDP (ESP32 AP mode) ------------------------
[env:test_loadcell_wifi]
build_src_filter =
    -<*>
    +<test_loadcell_wifi.cpp>
lib_deps =
    bogde/HX711 @ ^0.7.5
